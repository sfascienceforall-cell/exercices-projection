<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;font-family:system-ui,-apple-system,sans-serif;}
canvas{display:block;border-radius:12px;border:1.5px solid #e8e8e8;touch-action:none;}
.fml{font-size:13px;padding:10px 16px;border-radius:20px;background:#f5f5f5;border:1.5px solid #d0d0d0;color:#2c2c2a;margin:6px 0;font-family:ui-monospace,monospace;line-height:1.8;}
.row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap;}
.pill{font-size:13px;font-weight:500;color:#2c2c2a;background:#f5f5f5;border:1.5px solid #d0d0d0;border-radius:20px;padding:6px 14px;white-space:nowrap;}
.btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #d0d0d0;background:#fff;color:#2c2c2a;}
.btn.on{border-color:#185fa5;background:#e6f1fb;color:#185fa5;}
.btn.nav{font-weight:600;}
.val{min-width:56px;text-align:center;font-size:13px;font-weight:500;color:#2c2c2a;background:#f5f5f5;border:1.5px solid #d0d0d0;border-radius:20px;padding:5px 10px;}
.info{font-size:12px;padding:8px 14px;border-radius:20px;background:#f5f5f5;border:1.5px solid #d0d0d0;color:#555;margin:6px 0;font-family:ui-monospace,monospace;line-height:1.8;}
input[type=range]{flex:1;min-width:100px;}
</style>

<canvas id="cv" style="width:100%;height:58vh;min-height:360px;"></canvas>

<div class="fml" id="stmt"></div>

<div class="row">
  <button class="btn nav" onclick="go(-1)">◀ Précédent</button>
  <span class="pill" id="cnt" style="border-color:#b5d4f4;color:#185fa5;"></span>
  <button class="btn nav" onclick="go(1)">Suivant ▶</button>
  <button class="btn" id="bSol" onclick="toggleSol()">Voir la solution</button>
  <button class="btn" id="bAxes" style="display:none;border-color:#79c6a6;color:#0F6E56;" onclick="axesChoice=1-axesChoice;">Changer d'axes</button>
</div>

<div class="row" id="rowSl" style="display:none;">
  <span class="pill" id="slLab" style="color:#BA7517;border-color:#f5c88f;"></span>
  <input type="range" id="sl" style="accent-color:#BA7517;">
  <span class="val" id="slV" style="color:#BA7517;border-color:#f5c88f;"></span>
</div>

<div class="info" id="info"></div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const RED='#E24B4A',BLUE='#378ADD',GREEN='#1D9E75',VIOLET='#7F77DD',C_X='#D85A30',ORANGE='#BA7517',INK='#3d3d3a',GREY='#9aa0a6',AX='#c8ccd0';
let W=0,H=0,dpr=1,idx=0,reveal=false,p=0,axesChoice=0;
const D2R=Math.PI/180,f1=x=>x.toFixed(1);

function syncSize(){const r=cv.getBoundingClientRect();dpr=window.devicePixelRatio||1;
  const nW=Math.round(r.width)||700,nH=Math.round(r.height)||380;
  if(nW!==W||nH!==H){W=nW;H=nH;cv.width=W*dpr;cv.height=H*dpr;}ctx.setTransform(dpr,0,0,dpr,0,0);}

function arrow(x,y,vx,vy,col,lab,w,dash){const len=Math.hypot(vx,vy);if(len<3)return;const ex=x+vx,ey=y+vy;
  ctx.strokeStyle=col;ctx.lineWidth=w||2.5;ctx.lineCap='round';if(dash)ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();ctx.setLineDash([]);
  const hs=(w||2.5)*3.2,ang=Math.atan2(vy,vx);ctx.fillStyle=col;ctx.save();ctx.translate(ex,ey);ctx.rotate(ang);
  ctx.beginPath();ctx.moveTo(hs,0);ctx.lineTo(-hs*0.7,-hs*0.55);ctx.lineTo(-hs*0.7,hs*0.55);ctx.closePath();ctx.fill();ctx.restore();
  if(lab){ctx.font='600 13px system-ui';ctx.textAlign='center';ctx.fillStyle=col;ctx.fillText(lab,ex+vx/len*16,ey+vy/len*16+5);}}

// axes 2D standards avec graduations tous les 5 N
function axes2(O,kF,name1,name2){
  ctx.strokeStyle=AX;ctx.lineWidth=1.5;
  const xr=Math.min(W-16-O.x,12.5*kF),xl=Math.min(O.x-16,12.5*kF);
  const yu=Math.min(O.y-16,12.5*kF),yd=Math.min(H-16-O.y,12.5*kF);
  ctx.beginPath();ctx.moveTo(O.x-xl,O.y);ctx.lineTo(O.x+xr,O.y);ctx.moveTo(O.x,O.y+yd);ctx.lineTo(O.x,O.y-yu);ctx.stroke();
  ctx.fillStyle=AX;
  ctx.beginPath();ctx.moveTo(O.x+xr,O.y);ctx.lineTo(O.x+xr-8,O.y-4);ctx.lineTo(O.x+xr-8,O.y+4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(O.x,O.y-yu);ctx.lineTo(O.x-4,O.y-yu+8);ctx.lineTo(O.x+4,O.y-yu+8);ctx.closePath();ctx.fill();
  ctx.fillStyle=GREY;ctx.font='600 12px system-ui';ctx.textAlign='left';
  ctx.fillText(name1||'x',O.x+xr-12,O.y+16);ctx.fillText(name2||'y',O.x+10,O.y-yu+12);
  ctx.font='9px ui-monospace,monospace';ctx.textAlign='center';
  [-10,-5,5,10].forEach(t=>{const px=O.x+t*kF;if(px>O.x-xl&&px<O.x+xr){ctx.strokeStyle='#dfe3e7';ctx.beginPath();ctx.moveTo(px,O.y-3);ctx.lineTo(px,O.y+3);ctx.stroke();ctx.fillStyle=GREY;ctx.fillText(t,px,O.y+13);}
    const py=O.y-t*kF;if(py>O.y-yu&&py<O.y+yd){ctx.strokeStyle='#dfe3e7';ctx.beginPath();ctx.moveTo(O.x-3,py);ctx.lineTo(O.x+3,py);ctx.stroke();ctx.fillStyle=GREY;ctx.fillText(t,O.x-11,py+3);}});
}
// axes selon 2 directions physiques quelconques (u1,u2), y-monte
function axesU(O,kF,u1,u2,name1,name2,len){
  const L=len||11*kF;
  [[u1,name1],[u2,name2]].forEach(A=>{const u=A[0];
    const sx=u.x,sy=-u.y;
    ctx.strokeStyle=AX;ctx.lineWidth=1.5;ctx.beginPath();
    ctx.moveTo(O.x-sx*L*0.55,O.y-sy*L*0.55);ctx.lineTo(O.x+sx*L,O.y+sy*L);ctx.stroke();
    ctx.fillStyle=AX;const ang=Math.atan2(sy,sx);ctx.save();ctx.translate(O.x+sx*L,O.y+sy*L);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-4,-5);ctx.lineTo(-4,5);ctx.closePath();ctx.fill();ctx.restore();
    ctx.fillStyle=GREY;ctx.font='600 12px system-ui';ctx.textAlign='center';
    ctx.fillText(A[1],O.x+sx*(L+14),O.y+sy*(L+14)+4);});
}
// décomposition animée : v physique projeté sur u1,u2 ; retourne composantes
function projAnim(O,kF,vx,vy,u1,u2,pp,lab1,lab2){
  const c1=vx*u1.x+vy*u1.y,c2=vx*u2.x+vy*u2.y;
  const S=v=>({x:O.x+v.x*kF,y:O.y-v.y*kF});
  const tip=S({x:vx,y:vy}),F1=S({x:c1*u1.x,y:c1*u1.y}),F2=S({x:c2*u2.x,y:c2*u2.y});
  if(pp>0){
    ctx.strokeStyle='#b9bdc4';ctx.setLineDash([4,4]);ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(tip.x+(F1.x-tip.x)*pp,tip.y+(F1.y-tip.y)*pp);ctx.stroke();
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(tip.x+(F2.x-tip.x)*pp,tip.y+(F2.y-tip.y)*pp);ctx.stroke();ctx.setLineDash([]);
    arrow(O.x,O.y,(F1.x-O.x)*pp,(F1.y-O.y)*pp,C_X,pp>0.75?lab1:'',3);
    arrow(O.x,O.y,(F2.x-O.x)*pp,(F2.y-O.y)*pp,VIOLET,pp>0.75?lab2:'',3);
  }
  return {c1,c2};
}
function arcA(O,r,a0,a1,lab,col){ctx.strokeStyle=col||GREY;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.arc(O.x,O.y,r,a0,a1,a1<a0);ctx.stroke();
  if(lab){const am=(a0+a1)/2;ctx.fillStyle=col||GREY;ctx.font='600 12px system-ui';ctx.textAlign='center';
    ctx.fillText(lab,O.x+(r+13)*Math.cos(am),O.y+(r+13)*Math.sin(am)+4);}}

// ---------- scène plan incliné ----------
function incline(th){
  const gy=H*0.80,x0=W*0.10;
  const Lb=Math.min(W*0.62,(H*0.58)/Math.tan(th));
  const A={x:x0,y:gy},B={x:x0+Lb,y:gy-Lb*Math.tan(th)};
  ctx.strokeStyle=AX;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x0-8,gy);ctx.lineTo(x0+Lb+50,gy);ctx.stroke();
  ctx.lineWidth=1;for(let hx=x0;hx<x0+Lb+50;hx+=15){ctx.beginPath();ctx.moveTo(hx,gy);ctx.lineTo(hx-8,gy+9);ctx.stroke();}
  ctx.strokeStyle=INK;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();
  arcA(A,34,0,-th,'θ');
  const fr=0.55,P={x:A.x+(B.x-A.x)*fr,y:A.y+(B.y-A.y)*fr};
  const dir={x:Math.cos(th),y:-Math.sin(th)},ns={x:dir.y,y:-dir.x};
  const b=16,C={x:P.x+ns.x*b,y:P.y+ns.y*b};
  ctx.save();ctx.translate(P.x,P.y);ctx.rotate(-th);
  ctx.fillStyle='#eef4fb';ctx.strokeStyle='#185fa5';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-b,-2*b,2*b,2*b,5);ctx.fill();ctx.stroke();ctx.restore();
  return {C:C,u:{x:Math.cos(th),y:Math.sin(th)},n:{x:-Math.sin(th),y:Math.cos(th)},kF:H*0.0145};
}
// ---------- scène pendule ----------
function pendule(th){
  const PV={x:W*0.5,y:H*0.10},Lp=H*0.42;
  ctx.strokeStyle=INK;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(PV.x-56,PV.y);ctx.lineTo(PV.x+56,PV.y);ctx.stroke();
  ctx.strokeStyle='#bbb';ctx.lineWidth=1;for(let hx=PV.x-50;hx<PV.x+56;hx+=10){ctx.beginPath();ctx.moveTo(hx,PV.y);ctx.lineTo(hx-7,PV.y-7);ctx.stroke();}
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.setLineDash([4,5]);ctx.beginPath();ctx.moveTo(PV.x,PV.y);ctx.lineTo(PV.x,PV.y+Lp+26);ctx.stroke();ctx.setLineDash([]);
  const B={x:PV.x+Lp*Math.sin(th),y:PV.y+Lp*Math.cos(th)};
  ctx.strokeStyle=INK;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PV.x,PV.y);ctx.lineTo(B.x,B.y);ctx.stroke();
  arcA(PV,40,Math.PI/2,Math.PI/2-th,'θ');
  ctx.fillStyle='#eef4fb';ctx.strokeStyle=BLUE;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(B.x,B.y,12,0,7);ctx.fill();ctx.stroke();
  return {C:B,ut:{x:Math.cos(th),y:Math.sin(th)},ur:{x:-Math.sin(th),y:Math.cos(th)},kF:H*0.012};
}

// ================= LES 12 EXERCICES =================
const EX=[
{t:'Échauffement : force selon x',s:1,sl:null,
 st:'Une force <b style="color:#E24B4A">F̄ = 10 N</b> est dirigée selon +x. Donne <b style="color:#D85A30">Fₓ</b> et <b style="color:#7F77DD">F_y</b>.',
 draw:function(pp){const O={x:W*0.42,y:H*0.55},kF=Math.min(W,H)*0.026;axes2(O,kF);
   arrow(O.x,O.y,10*kF,0,RED,'F̄',3.4);projAnim(O,kF,10,0,{x:1,y:0},{x:0,y:1},pp,'Fₓ','F_y');},
 sol:function(){return 'La force est déjà alignée sur x : <b style="color:'+C_X+'">Fₓ = +10 N</b> ; <b style="color:'+VIOLET+'">F_y = 0 N</b>. Pas de trigo nécessaire.';}},

{t:'Le poids',s:1,sl:null,
 st:'Un objet de masse m = 2 kg subit son poids <b style="color:#378ADD">P̄ = m·g</b> (g ≈ 10 N/kg). Projette P̄ sur les axes x, y.',
 draw:function(pp){const O={x:W*0.42,y:H*0.36},kF=Math.min(W,H)*0.0165;axes2(O,kF);
   arrow(O.x,O.y,0,20*kF,BLUE,'P̄ = mḡ',3.4);projAnim(O,kF,0,-20,{x:1,y:0},{x:0,y:1},pp,'Pₓ','P_y');},
 sol:function(){return 'Le poids est vertical, vers le bas : <b style="color:'+C_X+'">Pₓ = 0 N</b> ; <b style="color:'+VIOLET+'">P_y = −m·g = −20 N</b>. Le signe − dit « vers les y négatifs ».';}},

{t:'Force inclinée (angle avec x)',s:2,sl:{lab:'θ',min:10,max:80,step:1,val:30,unit:'°'},
 st:'<b style="color:#E24B4A">F = 10 N</b> fait un angle θ avec l\'axe x. Exprime <b style="color:#D85A30">Fₓ</b> et <b style="color:#7F77DD">F_y</b> avec cosθ et sinθ.',
 draw:function(pp){const th=this.sl.val*D2R,O={x:W*0.40,y:H*0.62},kF=Math.min(W,H)*0.026;axes2(O,kF);
   arcA(O,34,0,-th,'θ');const v={x:10*Math.cos(th),y:10*Math.sin(th)};
   arrow(O.x,O.y,v.x*kF,-v.y*kF,RED,'F̄',3.4);projAnim(O,kF,v.x,v.y,{x:1,y:0},{x:0,y:1},pp,'Fₓ','F_y');},
 sol:function(){const th=this.sl.val*D2R;return '<b>Côté adjacent à θ → cos ; côté opposé → sin.</b> <b style="color:'+C_X+'">Fₓ = F·cosθ = '+f1(10*Math.cos(th))+' N</b> ; <b style="color:'+VIOLET+'">F_y = F·sinθ = '+f1(10*Math.sin(th))+' N</b>.';}},

{t:'PIÈGE : angle avec la verticale',s:2,sl:{lab:'α',min:5,max:80,step:1,val:25,unit:'°'},
 st:'<b style="color:#E24B4A">F = 10 N</b> fait un angle α avec l\'axe <b>y</b> (la verticale). Attention : cos et sin s\'échangent !',
 draw:function(pp){const al=this.sl.val*D2R,O={x:W*0.40,y:H*0.62},kF=Math.min(W,H)*0.026;axes2(O,kF);
   arcA(O,40,-Math.PI/2,-Math.PI/2+al,'α');const v={x:10*Math.sin(al),y:10*Math.cos(al)};
   arrow(O.x,O.y,v.x*kF,-v.y*kF,RED,'F̄',3.4);projAnim(O,kF,v.x,v.y,{x:1,y:0},{x:0,y:1},pp,'Fₓ','F_y');},
 sol:function(){const al=this.sl.val*D2R;return 'L\'angle est mesuré depuis <b>y</b> : le côté adjacent est sur y ! <b style="color:'+C_X+'">Fₓ = F·<u>sin</u>α = '+f1(10*Math.sin(al))+' N</b> ; <b style="color:'+VIOLET+'">F_y = F·<u>cos</u>α = '+f1(10*Math.cos(al))+' N</b>. Toujours regarder <b>de quel axe part l\'angle</b>, pas appliquer cos→x par réflexe.';}},

{t:'Signes : 2ᵉ quadrant',s:2,sl:{lab:'θ',min:95,max:175,step:1,val:135,unit:'°'},
 st:'<b style="color:#E24B4A">F = 10 N</b>, θ &gt; 90° (mesuré depuis +x). Quels <b>signes</b> pour Fₓ et F_y ?',
 draw:function(pp){const th=this.sl.val*D2R,O={x:W*0.46,y:H*0.60},kF=Math.min(W,H)*0.024;axes2(O,kF);
   arcA(O,30,0,-th,'θ');const v={x:10*Math.cos(th),y:10*Math.sin(th)};
   arrow(O.x,O.y,v.x*kF,-v.y*kF,RED,'F̄',3.4);projAnim(O,kF,v.x,v.y,{x:1,y:0},{x:0,y:1},pp,'Fₓ','F_y');},
 sol:function(){const th=this.sl.val*D2R;return 'Les formules ne changent pas, le cos s\'en charge : <b style="color:'+C_X+'">Fₓ = F·cosθ = '+f1(10*Math.cos(th))+' N &lt; 0</b> (vers −x) ; <b style="color:'+VIOLET+'">F_y = F·sinθ = '+f1(10*Math.sin(th))+' N &gt; 0</b>.';}},

{t:'Signes : sous l\'horizontale',s:2,sl:{lab:'θ',min:-80,max:-5,step:1,val:-35,unit:'°'},
 st:'<b style="color:#E24B4A">F = 10 N</b> pointe <b>sous</b> l\'horizontale (θ &lt; 0), comme une corde qui tire vers le bas.',
 draw:function(pp){const th=this.sl.val*D2R,O={x:W*0.38,y:H*0.42},kF=Math.min(W,H)*0.024;axes2(O,kF);
   arcA(O,34,0,-th,'θ');const v={x:10*Math.cos(th),y:10*Math.sin(th)};
   arrow(O.x,O.y,v.x*kF,-v.y*kF,RED,'F̄',3.4);projAnim(O,kF,v.x,v.y,{x:1,y:0},{x:0,y:1},pp,'Fₓ','F_y');},
 sol:function(){const th=this.sl.val*D2R;return '<b style="color:'+C_X+'">Fₓ = F·cosθ = '+f1(10*Math.cos(th))+' N &gt; 0</b> ; <b style="color:'+VIOLET+'">F_y = F·sinθ = '+f1(10*Math.sin(th))+' N &lt; 0</b> : la composante verticale tire vers le bas. Un angle négatif donne un sinus négatif — les signes sortent tout seuls.';}},

{t:'Plan incliné — axes liés à la pente',s:3,sl:{lab:'θ',min:10,max:50,step:1,val:30,unit:'°'},
 st:'LE classique : projette le poids <b style="color:#378ADD">P̄ = 20 N</b> sur les axes <b>liés à la pente</b> (x le long de la pente vers le haut, y ⟂ à la pente).',
 draw:function(pp){const th=this.sl.val*D2R,sc=incline(th);
   axesU(sc.C,sc.kF,sc.u,sc.n,'x','y',H*0.19);
   arrow(sc.C.x,sc.C.y,0,20*sc.kF,BLUE,'P̄',3.4);
   arcA(sc.C,30,Math.PI/2,Math.PI/2-th,'θ',BLUE);
   projAnim(sc.C,sc.kF,0,-20,sc.u,sc.n,pp,'Pₓ','P_y');},
 sol:function(){const th=this.sl.val*D2R;return 'L\'angle entre P̄ et l\'axe −y vaut θ (angles à côtés perpendiculaires). <b style="color:'+C_X+'">Pₓ = −P·sinθ = '+f1(-20*Math.sin(th))+' N</b> (tire vers le bas de la pente) ; <b style="color:'+VIOLET+'">P_y = −P·cosθ = '+f1(-20*Math.cos(th))+' N</b> (plaque contre la pente).';}},

{t:'Plan incliné — axes horizontal/vertical',s:3,sl:{lab:'θ',min:10,max:50,step:1,val:30,unit:'°'},
 st:'Même pente, mais axes <b>horizontal/vertical</b>. Projette maintenant la <b style="color:#7F77DD">normale N̄</b> (de norme P·cosθ = 20·cosθ).',
 draw:function(pp){const th=this.sl.val*D2R,sc=incline(th);
   axesU(sc.C,sc.kF,{x:1,y:0},{x:0,y:1},'x','y',H*0.19);
   const Nm=20*Math.cos(th),v={x:Nm*sc.n.x,y:Nm*sc.n.y};
   arrow(sc.C.x,sc.C.y,v.x*sc.kF,-v.y*sc.kF,VIOLET,'N̄',3.4);
   projAnim(sc.C,sc.kF,v.x,v.y,{x:1,y:0},{x:0,y:1},pp,'Nₓ','N_y');},
 sol:function(){const th=this.sl.val*D2R,Nm=20*Math.cos(th);return 'N̄ fait l\'angle θ avec la verticale : <b style="color:'+C_X+'">Nₓ = −N·sinθ = −20·cosθ·sinθ = '+f1(-Nm*Math.sin(th))+' N</b> ; <b style="color:'+VIOLET+'">N_y = +N·cosθ = 20·cos²θ = '+f1(Nm*Math.cos(th))+' N</b>. Des produits cosθ·sinθ, du cos²θ… ça marche, mais c\'est <b>lourd</b> → voir exercice suivant.';}},

{t:'Comparer les deux choix d\'axes',s:3,sl:{lab:'θ',min:10,max:50,step:1,val:30,unit:'°'},axesBtn:true,
 st:'Projette le poids <b style="color:#378ADD">P̄ = 20 N</b> avec les <b>deux</b> choix d\'axes (bouton « Changer d\'axes »). Aucun n\'est faux — lequel est malin, et pourquoi ?',
 draw:function(pp){const th=this.sl.val*D2R,sc=incline(th);
   const u1=axesChoice===0?sc.u:{x:1,y:0},u2=axesChoice===0?sc.n:{x:0,y:1};
   axesU(sc.C,sc.kF,u1,u2,axesChoice===0?'x (pente)':'x',axesChoice===0?'y (⟂)':'y',H*0.19);
   ctx.fillStyle='#0F6E56';ctx.font='600 12px system-ui';ctx.textAlign='left';
   ctx.fillText(axesChoice===0?'axes liés à la pente':'axes horizontal / vertical',14,20);
   arrow(sc.C.x,sc.C.y,0,20*sc.kF,BLUE,'P̄',3.4);
   projAnim(sc.C,sc.kF,0,-20,u1,u2,pp,'Pₓ','P_y');},
 sol:function(){const th=this.sl.val*D2R;return 'Axes pente : <b style="color:'+C_X+'">Pₓ=−P·sinθ='+f1(-20*Math.sin(th))+'</b>, <b style="color:'+VIOLET+'">P_y=−P·cosθ='+f1(-20*Math.cos(th))+'</b>. Axes horizontaux : Pₓ=0, P_y=−20. Le poids est plus simple dans le 2ᵉ… mais le mouvement (et N̄, f̄) est <b>le long de la pente</b> : avec les axes de pente, ΣF_y=0 et tout le mouvement vit sur un seul axe. <b>On choisit les axes selon le mouvement.</b>';}},

{t:'Traction inclinée sur la pente',s:4,sl:{lab:'α',min:0,max:45,step:1,val:20,unit:'°'},
 st:'Pente fixe θ = 30°. Une corde tire le bloc avec <b style="color:#1D9E75">F = 12 N</b> à un angle α <b>au-dessus de la surface de la pente</b>. Projette F̄ sur les axes de la pente.',
 draw:function(pp){const th=30*D2R,al=this.sl.val*D2R,sc=incline(th);
   axesU(sc.C,sc.kF,sc.u,sc.n,'x','y',H*0.19);
   const dirF={x:Math.cos(th+al),y:Math.sin(th+al)},v={x:12*dirF.x,y:12*dirF.y};
   arrow(sc.C.x,sc.C.y,v.x*sc.kF,-v.y*sc.kF,GREEN,'F̄',3.4);
   arcA(sc.C,44,-th,-th-al,'α',GREEN);
   projAnim(sc.C,sc.kF,v.x,v.y,sc.u,sc.n,pp,'Fₓ','F_y');},
 sol:function(){const al=this.sl.val*D2R;return 'Dans le repère de la pente, F̄ fait simplement l\'angle α avec l\'axe x : <b style="color:'+C_X+'">Fₓ = F·cosα = '+f1(12*Math.cos(al))+' N</b> (monte le bloc) ; <b style="color:'+VIOLET+'">F_y = F·sinα = '+f1(12*Math.sin(al))+' N</b> (soulage la pente → N̄ diminue !). L\'angle θ de la pente n\'apparaît pas : il est déjà « absorbé » par le choix des axes.';}},

{t:'Pendule — axes tangent / fil',s:4,sl:{lab:'θ',min:10,max:70,step:1,val:35,unit:'°'},
 st:'Le fil d\'un pendule fait un angle θ avec la verticale. Projette le poids <b style="color:#378ADD">P̄ = 20 N</b> sur l\'axe <b>x tangent</b> à la trajectoire et l\'axe <b>y le long du fil</b> (vers le pivot).',
 draw:function(pp){const th=this.sl.val*D2R,sc=pendule(th);
   axesU(sc.C,sc.kF,sc.ut,sc.ur,'x (tangent)','y (fil)',H*0.15);
   arrow(sc.C.x,sc.C.y,0,20*sc.kF,BLUE,'P̄',3.4);
   projAnim(sc.C,sc.kF,0,-20,sc.ut,sc.ur,pp,'Pₓ','P_y');},
 sol:function(){const th=this.sl.val*D2R;return 'Même géométrie que le plan incliné ! <b style="color:'+C_X+'">Pₓ = −P·sinθ = '+f1(-20*Math.sin(th))+' N</b> : c\'est la <b>force de rappel</b> qui ramène le pendule. <b style="color:'+VIOLET+'">P_y = −P·cosθ = '+f1(-20*Math.cos(th))+' N</b> : compensée (en partie) par la tension T̄ le long du fil.';}},

{t:'SYNTHÈSE : bilan complet sur la pente',s:5,sl:{lab:'θ',min:15,max:40,step:1,val:30,unit:'°'},
 st:'Bloc sur pente d\'angle θ : poids <b style="color:#378ADD">P̄=20 N</b>, normale <b style="color:#7F77DD">N̄</b>, traction <b style="color:#1D9E75">F̄=8 N</b> et frottement <b style="color:#BA7517">f̄=3 N</b>, tous deux vers le haut de la pente. Projette tout sur les axes de la pente et calcule <b>ΣFₓ</b> et <b>ΣF_y</b>.',
 draw:function(pp){const th=this.sl.val*D2R,sc=incline(th);
   axesU(sc.C,sc.kF,sc.u,sc.n,'x','y',H*0.17);
   const Nm=20*Math.cos(th);
   arrow(sc.C.x,sc.C.y,0,20*sc.kF,BLUE,'P̄',3.2);
   arrow(sc.C.x,sc.C.y,sc.n.x*Nm*sc.kF,-sc.n.y*Nm*sc.kF,VIOLET,'N̄',3);
   arrow(sc.C.x,sc.C.y,sc.u.x*8*sc.kF,-sc.u.y*8*sc.kF,GREEN,'F̄',3);
   arrow(sc.C.x+sc.n.x*8,sc.C.y-sc.n.y*8,sc.u.x*3*sc.kF,-sc.u.y*3*sc.kF,ORANGE,'f̄',2.6);
   projAnim(sc.C,sc.kF,0,-20,sc.u,sc.n,pp,'Pₓ','P_y');},
 sol:function(){const th=this.sl.val*D2R,Ps=20*Math.sin(th),Pc=20*Math.cos(th);
   return 'Seul P̄ doit être projeté (N̄, F̄, f̄ sont déjà sur les axes !) : Pₓ=−'+f1(Ps)+' N, P_y=−'+f1(Pc)+' N.<br><b style="color:'+C_X+'">ΣFₓ = F + f − P·sinθ = 8 + 3 − '+f1(Ps)+' = '+f1(8+3-Ps)+' N</b> → '+((8+3-Ps)>0?'le bloc accélère vers le <b>haut</b> de la pente':'le bloc accélère vers le <b>bas</b> de la pente (la traction ne suffit pas)')+'.<br><b style="color:'+VIOLET+'">ΣF_y = N − P·cosθ = 0 ⇒ N = '+f1(Pc)+' N</b> (pas de mouvement ⟂ à la pente).';}}
];

// ================= UI =================
function refreshUI(){const ex=EX[idx];
  document.getElementById('cnt').textContent='Exercice '+(idx+1)+'/12 — '+ex.t+' '+'★'.repeat(ex.s);
  document.getElementById('stmt').innerHTML=ex.st;
  document.getElementById('bAxes').style.display=ex.axesBtn?'inline-block':'none';
  const rs=document.getElementById('rowSl');
  if(ex.sl){rs.style.display='flex';
    const s=document.getElementById('sl');s.min=ex.sl.min;s.max=ex.sl.max;s.step=ex.sl.step;s.value=ex.sl.val;
    document.getElementById('slLab').textContent=ex.sl.lab;
    document.getElementById('slV').textContent=ex.sl.val+ex.sl.unit;
  } else rs.style.display='none';
  updateInfo();
}
function updateInfo(){const ex=EX[idx];
  document.getElementById('info').innerHTML=reveal?ex.sol():'À toi : écris les composantes sur papier, puis clique « Voir la solution » pour voir la décomposition animée.';
}
function go(d){idx=(idx+12+d)%12;reveal=false;p=0;axesChoice=0;
  document.getElementById('bSol').className='btn';document.getElementById('bSol').textContent='Voir la solution';refreshUI();}
function toggleSol(){reveal=!reveal;p=reveal?0:0;
  const b=document.getElementById('bSol');b.className=reveal?'btn on':'btn';b.textContent=reveal?'Cacher la solution':'Voir la solution';
  updateInfo();}
document.getElementById('sl').addEventListener('input',e=>{const ex=EX[idx];if(!ex.sl)return;
  ex.sl.val=parseFloat(e.target.value);document.getElementById('slV').textContent=ex.sl.val+ex.sl.unit;if(reveal)updateInfo();});
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});

function draw(){syncSize();ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  if(reveal&&p<1)p=Math.min(1,p+0.03);
  EX[idx].draw(p);
  requestAnimationFrame(draw);}
refreshUI();draw();
</script>
